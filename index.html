<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paper List</title>
  <style>
    body {
      margin: 32px;
      color: #111;
      background: #fff;
    }

    h1 {
      margin: 0 0 24px 0;
      font-size: 28px;
      font-weight: 700;
    }

    h3 {
      margin: 28px 0 12px 0;
    }

    .paper {
      margin: 0 0 18px 0;
      font-size: 18px;
      line-height: 1.5;
    }

    .paper-line {
      margin: 2px 0;
    }

    .paper-title a {
      color: inherit;
      text-decoration: none;
    }

    .paper-title a:hover {
      text-decoration: underline;
    }

    sup {
      font-size: 75%;
      line-height: 0;
      vertical-align: super;
    }

    #message {
      margin: 16px 0 24px 0;
      padding: 12px 14px;
      border: 1px solid #ddd;
      background: #fafafa;
      font-size: 15px;
      line-height: 1.5;
      display: none;
    }

    #csv-file {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>论文列表</h1>
  <div id="message"></div>
  <main id="paper-list"></main>

  <script>
    const DEFAULT_CSV_FILE = 'paper.csv';

    document.addEventListener('DOMContentLoaded', () => {
      loadCsvAutomatically();
    });

    async function loadCsvAutomatically() {
      const csvFile = new URLSearchParams(window.location.search).get('csv') || DEFAULT_CSV_FILE;

      try {
        const response = await fetch(csvFile, { cache: 'no-store' });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const csvText = await response.text();
        renderPapers(parseCsv(csvText));
      } catch (error) {
        showFallback(csvFile, error);
      }
    }

    function showFallback(csvFile, error) {
      const message = document.getElementById('message');
      message.style.display = 'block';
      message.textContent = '';

      const text = document.createElement('div');
      text.textContent = `未能自动读取 ${csvFile}。请确认 CSV 与本 HTML 位于同一目录，或通过本地服务器打开页面。本地 file:// 打开时，部分浏览器会阻止自动读取同目录文件。也可以在下方手动选择 CSV 文件。`;
      message.appendChild(text);

      const input = document.createElement('input');
      input.id = 'csv-file';
      input.type = 'file';
      input.accept = '.csv,text/csv';
      input.addEventListener('change', event => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
          renderPapers(parseCsv(String(reader.result || '')));
          message.style.display = 'none';
        };
        reader.onerror = () => {
          text.textContent = '读取所选 CSV 文件失败。';
        };
        reader.readAsText(file, 'utf-8');
      });
      message.appendChild(input);

      console.warn('CSV auto-load failed:', error);
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;

      const input = text.replace(/^\uFEFF/, '');

      for (let i = 0; i < input.length; i++) {
        const char = input[i];
        const nextChar = input[i + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            field += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(field);
          field = '';
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && nextChar === '\n') {
            i++;
          }
          row.push(field);
          if (row.some(cell => cell.trim() !== '')) {
            rows.push(row);
          }
          row = [];
          field = '';
        } else {
          field += char;
        }
      }

      if (field !== '' || row.length > 0) {
        row.push(field);
        if (row.some(cell => cell.trim() !== '')) {
          rows.push(row);
        }
      }

      if (rows.length === 0) return [];

      const headers = rows[0].map(header => header.trim());
      return rows.slice(1).map(rowValues => {
        const record = {};
        headers.forEach((header, index) => {
          record[header] = rowValues[index] === undefined ? '' : rowValues[index].trim();
        });
        return record;
      });
    }

    function renderPapers(records) {
      const container = document.getElementById('paper-list');
      container.textContent = '';

      const sortedRecords = records
        .filter(record => hasValue(record.year) && hasValue(record.title))
        .sort((a, b) => {
          const yearDiff = numberOrFallback(b.year) - numberOrFallback(a.year);
          if (yearDiff !== 0) return yearDiff;
          return numberOrFallback(a.id) - numberOrFallback(b.id);
        });

      let currentYear = null;
      for (const record of sortedRecords) {
        if (record.year !== currentYear) {
          currentYear = record.year;
          const yearHeading = document.createElement('h3');
          yearHeading.textContent = currentYear;
          container.appendChild(yearHeading);
        }

        container.appendChild(createPaperElement(record));
      }
    }

    function createPaperElement(record) {
      const paper = document.createElement('article');
      paper.className = 'paper';

      paper.appendChild(createTitleLine(record));
      paper.appendChild(createAuthorLine(record));
      paper.appendChild(createVenueLine(record));

      return paper;
    }

    function createTitleLine(record) {
      const line = document.createElement('div');
      line.className = 'paper-line paper-title';

      const strong = document.createElement('strong');
      if (hasValue(record.link)) {
        const link = document.createElement('a');
        link.href = record.link;
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.textContent = record.title || '';
        strong.appendChild(link);
      } else {
        strong.textContent = record.title || '';
      }
      line.appendChild(strong);

      if ((record.status || '').trim().toLowerCase() === 'ac') {
        line.appendChild(document.createTextNode(' (Accepted)'));
      }

      return line;
    }

    function createAuthorLine(record) {
      const line = document.createElement('div');
      line.className = 'paper-line';

      const authors = splitNames(record.author);
      const corauthors = new Set(splitNames(record.corauthor));
      const cofirstAuthors = new Set(splitNames(record.cofauthor));

      authors.forEach((author, index) => {
        const nameNode = author === 'Shengcheng Yu'
          ? createStrongText(author)
          : document.createTextNode(author);
        line.appendChild(nameNode);

        if (corauthors.has(author)) {
          line.appendChild(createSup('*'));
        }
        if (cofirstAuthors.has(author)) {
          line.appendChild(createSup('#'));
        }

        if (index === authors.length - 1) {
          line.appendChild(document.createTextNode('.'));
        } else {
          line.appendChild(document.createTextNode(', '));
        }
      });

      return line;
    }

    function createVenueLine(record) {
      const line = document.createElement('div');
      line.className = 'paper-line';

      if (hasValue(record.level)) {
        const level = document.createElement('strong');
        level.textContent = `[${record.level}]`;
        line.appendChild(level);
        if (hasValue(record.venue)) {
          line.appendChild(document.createTextNode(' '));
        }
      }

      if (hasValue(record.venue)) {
        line.appendChild(document.createTextNode(record.venue));
      }

      return line;
    }

    function splitNames(value) {
      if (!hasValue(value)) return [];
      return value
        .split(/[;,]/)
        .map(name => name.trim())
        .filter(name => hasValue(name));
    }

    function hasValue(value) {
      return value !== undefined && value !== null && String(value).trim() !== '' && String(value).trim() !== '/';
    }

    function numberOrFallback(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : 0;
    }

    function createStrongText(text) {
      const strong = document.createElement('strong');
      strong.textContent = text;
      return strong;
    }

    function createSup(text) {
      const sup = document.createElement('sup');
      sup.textContent = text;
      return sup;
    }
  </script>
</body>
</html>
